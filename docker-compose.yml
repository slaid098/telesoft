services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./app_data:/app/app_data
    env_file:
      - .env
    networks:
      - telesoft-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - telesoft-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  telesoft-network:
    driver: bridge