x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - ./src:/app/src
      - ./app_data:/app/app_data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - telesoft-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *default-logging

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.web
      args:
        VITE_API_BASE: ""
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - telesoft-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *default-logging

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - telesoft-network
    logging:
      <<: *default-logging

networks:
  telesoft-network:
    driver: bridge
