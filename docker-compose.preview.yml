services:
  web:
    build:
      args:
        VITE_API_BASE: ""
    ports:
      - "3000:3000"
    volumes: !reset []

  api:
    volumes: !reset []

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - telesoft-network
